name: Android CI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build native APKs
        run: |
          set -euo pipefail
          mkdir -p build/ci
          {
            java -version
            gradle --version
            gradle :app:assembleDebug :app:assembleRelease --stacktrace
          } 2>&1 | tee build/ci/android-build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: build/ci/android-build.log
          if-no-files-found: warn

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ETGmusic-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ETGmusic-release
          path: app/build/outputs/apk/release/*.apk

      - name: Publish latest artifacts branch
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          out_dir="$(mktemp -d)"
          cp app/build/outputs/apk/debug/*.apk "$out_dir/etgmusic-native-debug.apk"
          cp app/build/outputs/apk/release/*.apk "$out_dir/etgmusic-native-release.apk"
          cp build/ci/android-build.log "$out_dir/android-build.log"
          cat > "$out_dir/README.txt" <<EOF
          ETGmusic native Android build
          Commit: ${GITHUB_SHA}
          Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Install:
          - etgmusic-native-release.apk: package io.qwulise1.etgmusic
          - etgmusic-native-debug.apk: package io.qwulise1.etgmusic.debug
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan latest-artifacts
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R "$out_dir"/. .
          git add -A
          git commit -m "Publish native ETGmusic artifacts for ${GITHUB_SHA}"
          git push --force origin latest-artifacts
