name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_mode:
        description: Build type for Buildozer
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILDOZER_WARN_ON_ROOT: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Resolve build mode
        run: echo "BUILD_MODE=${{ github.event_name == 'workflow_dispatch' && inputs.build_mode || 'debug' }}" >> "$GITHUB_ENV"

      - name: Cache Buildozer state
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
            ~/.cache/pip
          key: ${{ runner.os }}-buildozer-${{ env.BUILD_MODE }}-${{ hashFiles('buildozer.spec', 'requirements.txt', 'main.py') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-${{ env.BUILD_MODE }}-
            ${{ runner.os }}-buildozer-

      - name: Build arm64-v8a APK
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          command: buildozer -v android ${{ env.BUILD_MODE }}
          buildozer_version: stable

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ETGmusic-${{ env.BUILD_MODE }}-arm64-v8a
          path: bin/*.apk
          if-no-files-found: error
