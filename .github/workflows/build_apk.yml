name: Android Flutter CI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.35.2"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          set -euo pipefail
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;29.0.14206865"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Prepare environment
        run: |
          set -euo pipefail
          cat > .env <<'EOF'
          ENABLE_UPDATE_CHECK=0
          LASTFM_API_KEY=etgmusic
          LASTFM_API_SECRET=etgmusic
          RELEASE_CHANNEL=stable
          HIDE_DONATIONS=1
          EOF
          flutter --version
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Build stable APK
        run: |
          set -euo pipefail
          mkdir -p build/ci
          {
            flutter build apk --flavor stable --release --target-platform android-arm,android-arm64,android-x64
          } 2>&1 | tee build/ci/android-build.log

      - name: Collect APK
        if: success()
        run: |
          set -euo pipefail
          mkdir -p build/ci/apk
          apk="$(find build/app/outputs -type f -name '*stable*release*.apk' | head -n 1)"
          test -n "$apk"
          cp "$apk" build/ci/apk/etgmusic-spotube-release.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: build/ci/android-build.log
          if-no-files-found: warn

      - name: Upload release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ETGmusic-Spotube-release
          path: build/ci/apk/etgmusic-spotube-release.apk

      - name: Publish latest release
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cat > build/ci/README.txt <<EOF
          ETGmusic Spotube-base Android build
          Commit: ${GITHUB_SHA}
          Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Install:
          - etgmusic-spotube-release.apk: package io.qwulise1.etgmusic

          Base:
          - Spotube by Kingkor Roy Tirtho, BSD-4-Clause
          EOF

          gh release delete latest --yes --cleanup-tag >/dev/null 2>&1 || true
          gh release create latest \
            build/ci/apk/etgmusic-spotube-release.apk#etgmusic-spotube-release.apk \
            build/ci/android-build.log#android-build.log \
            build/ci/README.txt#README.txt \
            --target "${GITHUB_SHA}" \
            --title "ETGmusic latest Android build" \
            --notes-file build/ci/README.txt \
            --latest
