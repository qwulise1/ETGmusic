name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_mode:
        description: Build type for Buildozer
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILDOZER_WARN_ON_ROOT: "0"
      APP_ANDROID_ARCH: arm64-v8a
      BUILD_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.build_mode || 'debug' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare artifact directories
        run: mkdir -p ci_artifacts .buildozer_global

      - name: Build arm64-v8a APK
        continue-on-error: true
        run: |
          set +e
          docker run --rm \
            -v "$GITHUB_WORKSPACE/.buildozer_global":/home/user/.buildozer \
            -v "$GITHUB_WORKSPACE":/home/user/hostcwd \
            -w /home/user/hostcwd \
            -e BUILDOZER_WARN_ON_ROOT="$BUILDOZER_WARN_ON_ROOT" \
            -e APP_ANDROID_ARCH="$APP_ANDROID_ARCH" \
            ghcr.io/kivy/buildozer:latest \
            -v android "$BUILD_MODE" 2>&1 | tee ci_artifacts/buildozer.log
          status=${PIPESTATUS[0]}
          printf '%s\n' "$status" > ci_artifacts/build_exit_code.txt
          find . -maxdepth 6 -type f \( -name '*.apk' -o -name '*.aab' -o -name '*.log' \) | sort > ci_artifacts/workspace_files.txt
          exit 0

      - name: Upload build outputs and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ETGmusic-${{ env.BUILD_MODE }}-artifacts
          path: |
            ci_artifacts/**
            bin/*.apk
            bin/*.aab
            .buildozer/**/*.log
            .buildozer/android/platform/build-*/dists/**/build.log
            .buildozer/android/platform/build-*/dists/**/stdout.txt
            .buildozer/android/platform/build-*/dists/**/stderr.txt
          if-no-files-found: warn

      - name: Fail workflow if build failed
        run: |
          if [ ! -f ci_artifacts/build_exit_code.txt ]; then
            echo "Missing ci_artifacts/build_exit_code.txt"
            exit 1
          fi
          status="$(cat ci_artifacts/build_exit_code.txt)"
          echo "Build exit code: $status"
          if [ "$status" != "0" ]; then
            echo "Buildozer build failed. See uploaded artifacts for logs."
            exit "$status"
          fi

      - name: Publish latest artifacts branch
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          out_dir="$(mktemp -d)"
          cp bin/*.apk "$out_dir"/
          cp ci_artifacts/buildozer.log "$out_dir"/
          cp ci_artifacts/workspace_files.txt "$out_dir"/
          cat > "$out_dir/README.txt" <<EOF
          ETGmusic latest GitHub build
          Commit: $GITHUB_SHA
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Install the APK from this branch. It is a CI debug-key signed test build.
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan latest-artifacts-publish
          git rm -rf . >/dev/null 2>&1 || true
          cp -R "$out_dir"/. .
          git add .
          git commit -m "Update ETGmusic artifacts for ${GITHUB_SHA::7}"
          git push --force origin HEAD:latest-artifacts
